<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krustiņi un Nullītes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Main Menu Screen -->
        <div id="menu-screen" class="screen active">
            <div class="menu-content">
                <h1>Krustiņi un Nullītes</h1>
                <p class="subtitle">Spēlē pret MI</p>

                <div class="form-group">
                    <label for="nickname-input">Ievadi savu vārdu:</label>
                    <input
                        type="text"
                        id="nickname-input"
                        placeholder="Your Name"
                        maxlength="20"
                    >
                </div>

                <div class="form-group">
                    <label for="difficulty-select">Izvēlies grūtības līmeni:</label>
                    <select id="difficulty-select">
                        <option value="easy">Viegls</option>
                        <option value="medium" selected>Vidējs</option>
                        <option value="hard">Grūts</option>
                    </select>
                </div>

                <button id="start-btn" class="btn btn-primary">Sākt Spēli</button>
                <button id="view-leaderboard-btn" class="btn btn-secondary">Skatīt līderu tabulu</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <h2 id="game-title">Spēle</h2>
                <p id="game-status">Tava kārta (X)</p>
            </div>

            <div class="game-board">
                <div class="board-cell" data-position="0"></div>
                <div class="board-cell" data-position="1"></div>
                <div class="board-cell" data-position="2"></div>
                <div class="board-cell" data-position="3"></div>
                <div class="board-cell" data-position="4"></div>
                <div class="board-cell" data-position="5"></div>
                <div class="board-cell" data-position="6"></div>
                <div class="board-cell" data-position="7"></div>
                <div class="board-cell" data-position="8"></div>
            </div>

            <div class="game-controls">
                <button id="restart-btn" class="btn btn-primary">Spēlēt vēlreiz</button>
                <button id="menu-btn" class="btn btn-secondary">Atgriezties sākumlapā</button>
            </div>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen">
            <div class="leaderboard-header">
                <h2>Līderu tabula</h2>
                <p>Top Spēlētāji</p>
            </div>

            <div class="leaderboard-content">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Vieta</th>
                            <th>Spēlētājs</th>
                            <th>Uzvaras</th>
                            <th>Zaudējumi</th>
                            <th>Neizšķirts</th>
                            <th>Kopā</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr class="loading">
                            <td colspan="6">Lādējas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button id="back-from-leaderboard-btn" class="btn btn-secondary">Atgriezties sākumlapā</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
